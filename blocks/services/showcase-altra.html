<div class="cb-video-showcase-altra-wrapper">

<script src="https://player.vimeo.com/api/player.js"></script>
<script>
(function() {
  function initAltra() {
    var wrapper = document.querySelector('.cb-video-showcase-altra-wrapper');
    if (!wrapper) return;
    var allVids = wrapper.querySelectorAll('[data-altra-vid]');
    var players = [];
    var overlays = [];
    var activeIndex = null;
    allVids.forEach(function(v) {
      var iframe = v.querySelector('iframe');
      var p = new Vimeo.Player(iframe);
      p.setVolume(0);
      players.push(p);
      overlays.push(v.querySelector('.cb-video-overlay-altra'));
    });
    function resetAll() {
      allVids.forEach(function(v, i) {
        v.classList.remove('cb-altra-playing');
        overlays[i].style.opacity = '1';
        players[i].setVolume(0);
        players[i].play();
      });
      activeIndex = null;
    }
    allVids.forEach(function(v, idx) {
      v.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        if (activeIndex === idx) {
          resetAll();
        } else {
          resetAll();
          players.forEach(function(p, i) {
            if (i !== idx) { p.pause(); p.setVolume(0); }
          });
          v.classList.add('cb-altra-playing');
          overlays[idx].style.opacity = '0';
          players[idx].setVolume(1);
          players[idx].play();
          activeIndex = idx;
        }
      });
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initAltra);
  } else { initAltra(); }
})();
</script>
