<div class="cb-video-showcase-pointme-wrapper">
  <div class="cb-video-showcase-pointme-container">

        <div class="cb-video-overlay-pointme"></div>

<script src="https://player.vimeo.com/api/player.js"></script>
<script>
(function() {
  function initPointme() {
    var item = document.querySelector('[data-pointme-vid]');
    if (!item) return;
    var iframe = item.querySelector('iframe');
    var overlay = item.querySelector('.cb-video-overlay-pointme');
    var player = new Vimeo.Player(iframe);
    var isActive = false;
    player.setVolume(0);
    item.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      if (!isActive) {
        item.classList.add('cb-pointme-playing');
        overlay.style.opacity = '0';
        player.setVolume(1);
        player.play();
        isActive = true;
      } else {
        item.classList.remove('cb-pointme-playing');
        overlay.style.opacity = '1';
        player.setVolume(0);
        player.play();
        isActive = false;
      }
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initPointme);
  } else { initPointme(); }
})();
</script>
