<!-- Cinebody Signature Color Bar -->
<!-- Paste this into a Squarespace Code Block -->

<style>
  /* Force remove all padding */
  .sqs-block-code {
    padding: 0 !important;
    margin: 0 !important;
  }

  /* Full-width wrapper */
  .cb-colorbar-wrapper {
    width: 100vw;
    position: relative;
    left: 50%;
    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
    overflow: hidden;
    height: 14px;
    margin-top: 0 !important;
    margin-bottom: 0 !important;
    padding: 0 !important;
    display: block;
  }

  /* Moving track */
  .cb-colorbar-track {
    display: flex;
    height: 100%;
    width: max-content;
    animation: cb-scroll 40s linear infinite;
  }

  /* Individual segments */
  .cb-bar-segment {
    width: 33.33vw;
    height: 100%;
    flex-shrink: 0;
  }

  /* Colors - repeating pattern */
  .cb-bar-blue { background: #00bcf1; }
  .cb-bar-yellow { background: #ffec03; }
  .cb-bar-pink { background: #eb008b; }

  @keyframes cb-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100vw); }
  }

  /* Mobile - faster */
  @media (max-width: 768px) {
    .cb-colorbar-track {
      animation: cb-scroll 15s linear infinite;
    }
  }

  /* Pause on hover */
  .cb-colorbar-wrapper:hover .cb-colorbar-track {
    animation-play-state: paused;
  }
</style>

<div class="cb-colorbar-wrapper">
  <div class="cb-colorbar-track">
    <!-- Pattern repeats to create seamless loop -->
    <div class="cb-bar-segment cb-bar-blue"></div>
    <div class="cb-bar-segment cb-bar-yellow"></div>
    <div class="cb-bar-segment cb-bar-pink"></div>
    <div class="cb-bar-segment cb-bar-blue"></div>
    <div class="cb-bar-segment cb-bar-yellow"></div>
    <div class="cb-bar-segment cb-bar-pink"></div>
    <div class="cb-bar-segment cb-bar-blue"></div>
    <div class="cb-bar-segment cb-bar-yellow"></div>
    <div class="cb-bar-segment cb-bar-pink"></div>
  </div>
</div>
