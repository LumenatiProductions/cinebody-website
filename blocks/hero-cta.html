<!-- Cinebody Hero CTA Section -->

<style>
  /* Full-width hero section */
  .cb-hero-wrapper {
    width: 100vw;
    position: relative;
    left: 50%;
    transform: translateX(-50%);
    padding: 100px 20px;
    background: #ffec03;
    overflow: hidden;
    text-align: center;
  }
  .cb-hero-container {
    max-width: 1200px;
    margin: 0 auto;
  }
  /* Hero text */
  .cb-hero-text {
    margin-bottom: 50px;
  }
  .cb-hero-line1 {
    font-family: 'Open Sans', sans-serif;
    font-size: clamp(2rem, 5.5vw, 4rem);
    font-weight: 700;
    color: #5A5A5A;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
    animation: cb-slideDown 0.8s ease-out;
  }
  .cb-hero-line2 {
    font-family: 'Open Sans', sans-serif;
    font-size: clamp(2rem, 5.5vw, 4rem);
    font-weight: 700;
    color: #00bcf1;
    line-height: 1.1;
    letter-spacing: -0.03em;
    animation: cb-slideDown 0.8s ease-out 0.1s both;
  }
  @keyframes cb-slideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  /* CTA Button */
  .cb-hero-button {
    display: inline-block;
    font-family: 'Open Sans', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: #ffffff;
    background: #00bcf1;
    border: none;
    padding: 20px 55px;
    border-radius: 10px;
    text-decoration: none;
    text-transform: capitalize;
    transition: all 0.3s ease;
    box-shadow: 0 6px 16px rgba(0, 188, 241, 0.35);
    animation: cb-buttonPop 0.6s ease-out 0.4s both;
  }
  @keyframes cb-buttonPop {
    0% { opacity: 0; transform: scale(0.85); }
    60% { transform: scale(1.08); }
    100% { opacity: 1; transform: scale(1); }
  }
  .cb-hero-button:hover {
    background: #0099c8;
    transform: translateY(-4px) scale(1.05);
    box-shadow: 0 12px 28px rgba(0, 188, 241, 0.45);
  }
  /* Tablet */
  @media (max-width: 900px) {
    .cb-hero-wrapper {
      padding: 80px 20px;
    }
    .cb-hero-text {
      margin-bottom: 40px;
    }
  }
  /* Mobile */
  @media (max-width: 600px) {
    .cb-hero-wrapper {
      padding: 60px 15px;
    }
    .cb-hero-text {
      margin-bottom: 35px;
    }
    .cb-hero-button {
      font-size: 1.05rem;
      padding: 18px 45px;
    }
  }
</style>
<div class="cb-hero-wrapper">
  <div class="cb-hero-container">

    <div class="cb-hero-text">
      <div class="cb-hero-line1">Stop outsourcing to strangers.</div>
      <div class="cb-hero-line2">Start capturing from your community.</div>
    </div>
    <a href="https://calendly.com/tyler-cinebody/creating-high-quality-ugc-with-cinebody" class="cb-hero-button">See How It Works</a>
  </div>
</div>
