<!-- Cinebody Campaign Reach Map - Nike Case Study -->
<!-- Paste this into a Squarespace Code Block -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap');

  .cb-map-wrapper {
    width: 100vw;
    position: relative;
    left: 50%;
    transform: translateX(-50%);
    background: #F4F4F3;
    overflow: hidden;
    margin-top: 0 !important;
    margin-bottom: 0 !important;
  }
  .cb-map-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 80px 40px;
  }
  .cb-map-header {
    text-align: center;
    margin-bottom: 48px;
    animation: cb-map-fadeUp 0.8s ease-out;
  }
  @keyframes cb-map-fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .cb-map-title {
    font-family: 'Open Sans', sans-serif;
    font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    font-weight: 800;
    color: #5a5a5a;
    line-height: 1.15;
    letter-spacing: -0.03em;
    margin: 0 0 8px 0;
  }
  .cb-map-title span {
    color: #00bcf1;
  }
  .cb-map-subtitle {
    font-family: 'Open Sans', sans-serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: #8a8a8a;
    margin: 0;
  }

  /* Map Container */
  .cb-map-visual {
    position: relative;
    width: 100%;
    max-width: 900px;
    margin: 0 auto 56px auto;
    animation: cb-map-fadeUp 0.8s ease-out 0.2s both;
  }
  .cb-map-svg-wrap {
    position: relative;
    width: 100%;
  }
  .cb-map-svg-wrap svg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* City Dots */
  .cb-map-dot {
    transition: fill 0.3s ease;
    cursor: pointer;
  }
  .cb-map-dot:hover {
    fill: #ffd200;
  }

  /* Pulse Animation */
  .cb-map-pulse {
    animation: cb-map-pulse-ring 2s ease-out infinite;
    transform-origin: center;
  }
  @keyframes cb-map-pulse-ring {
    0% { r: 6; opacity: 0.6; }
    70% { r: 18; opacity: 0; }
    100% { r: 18; opacity: 0; }
  }

  /* Dashed Lines */
  .cb-map-line {
    stroke-dasharray: 6 4;
    animation: cb-map-dash 1.5s linear infinite;
  }
  @keyframes cb-map-dash {
    to { stroke-dashoffset: -20; }
  }

  /* City Labels on Map */
  .cb-map-city-label {
    font-family: 'Open Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    fill: #5a5a5a;
    text-anchor: middle;
    pointer-events: none;
  }

  /* Stats Bar */
  .cb-map-stats {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
    background: #ffffff;
    border-radius: 16px;
    padding: 28px 40px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    max-width: 720px;
    margin: 0 auto;
    animation: cb-map-fadeUp 0.8s ease-out 0.4s both;
  }
  .cb-map-stat {
    flex: 1;
    text-align: center;
    position: relative;
  }
  .cb-map-stat + .cb-map-stat::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 40px;
    background: #e0e0e0;
  }
  .cb-map-stat-value {
    font-family: 'Open Sans', sans-serif;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 800;
    color: #00bcf1;
    line-height: 1.2;
    margin: 0 0 4px 0;
  }
  .cb-map-stat-label {
    font-family: 'Open Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: #8a8a8a;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0;
  }

  /* Responsive */
  @media (max-width: 1000px) {
    .cb-map-inner { padding: 60px 28px; }
  }
  @media (max-width: 768px) {
    .cb-map-inner { padding: 48px 20px; }
    .cb-map-header { margin-bottom: 32px; }
    .cb-map-visual { margin-bottom: 40px; }
    .cb-map-stats { flex-direction: column; gap: 20px; padding: 24px 28px; border-radius: 14px; }
    .cb-map-stat + .cb-map-stat::before { display: none; }
    .cb-map-stat { padding: 8px 0; }
  }
  @media (max-width: 640px) {
    .cb-map-wrapper { width: 100%; left: 0; position: static; transform: none; overflow: hidden; }
    .cb-map-inner { padding: 40px 16px; }
    .cb-map-city-label { font-size: 10px; }
  }
</style>

<div class="cb-map-wrapper">
  <div class="cb-map-inner">

    <div class="cb-map-header">
      <h2 class="cb-map-title">One platform. Four cities. <span>Content captured simultaneously.</span></h2>
      <p class="cb-map-subtitle">Cinebody coordinated runners in every market with zero production crews on the ground.</p>
    </div>

    <div class="cb-map-visual">
      <div class="cb-map-svg-wrap">
        <svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">

          <!-- US Map Outline (simplified) -->
          <path d="
            M 120 140 L 180 120 L 260 115 L 340 105 L 400 100 L 460 95 L 520 100 L 580 95 L 640 100 L 700 110 L 750 125 L 800 140 L 830 160 L 850 190 L 845 220 L 835 250 L 820 270 L 830 300 L 840 330 L 835 360 L 820 390 L 800 410 L 780 420 L 760 440 L 740 450 L 720 455 L 695 440 L 680 450 L 660 445 L 640 455 L 610 460 L 580 470 L 550 465 L 520 470 L 490 465 L 460 460 L 430 455 L 400 460 L 370 470 L 340 465 L 310 460 L 280 465 L 250 470 L 220 460 L 195 450 L 175 440 L 160 420 L 145 400 L 130 380 L 115 350 L 105 320 L 100 290 L 95 260 L 100 230 L 105 200 L 110 170 Z
          " fill="#e0dfdd" stroke="#c8c7c5" stroke-width="1.5" stroke-linejoin="round"/>

          <!-- State-like interior detail lines -->
          <line x1="400" y1="100" x2="400" y2="460" stroke="#d0cfcd" stroke-width="0.5" opacity="0.5"/>
          <line x1="550" y1="100" x2="550" y2="470" stroke="#d0cfcd" stroke-width="0.5" opacity="0.5"/>
          <line x1="280" y1="115" x2="280" y2="465" stroke="#d0cfcd" stroke-width="0.5" opacity="0.5"/>
          <line x1="680" y1="110" x2="680" y2="450" stroke="#d0cfcd" stroke-width="0.5" opacity="0.5"/>
          <line x1="100" y1="250" x2="850" y2="250" stroke="#d0cfcd" stroke-width="0.5" opacity="0.5"/>
          <line x1="100" y1="350" x2="840" y2="350" stroke="#d0cfcd" stroke-width="0.5" opacity="0.5"/>

          <!-- Dashed Connection Lines between cities -->
          <!-- LA to Austin -->
          <line x1="165" y1="340" x2="460" y2="400" class="cb-map-line" stroke="#00bcf1" stroke-width="1.5" fill="none" opacity="0.5"/>
          <!-- Austin to Chicago -->
          <line x1="460" y1="400" x2="580" y2="220" class="cb-map-line" stroke="#00bcf1" stroke-width="1.5" fill="none" opacity="0.5"/>
          <!-- Chicago to NYC -->
          <line x1="580" y1="220" x2="810" y2="195" class="cb-map-line" stroke="#00bcf1" stroke-width="1.5" fill="none" opacity="0.5"/>
          <!-- LA to Chicago -->
          <line x1="165" y1="340" x2="580" y2="220" class="cb-map-line" stroke="#00bcf1" stroke-width="1.5" fill="none" opacity="0.3"/>
          <!-- Austin to NYC -->
          <line x1="460" y1="400" x2="810" y2="195" class="cb-map-line" stroke="#00bcf1" stroke-width="1.5" fill="none" opacity="0.3"/>
          <!-- LA to NYC -->
          <line x1="165" y1="340" x2="810" y2="195" class="cb-map-line" stroke="#00bcf1" stroke-width="1" fill="none" opacity="0.2"/>

          <!-- City: Los Angeles -->
          <circle cx="165" cy="340" r="6" class="cb-map-pulse" fill="none" stroke="#00bcf1" stroke-width="2" opacity="0.6"/>
          <circle cx="165" cy="340" r="6" class="cb-map-pulse" fill="none" stroke="#00bcf1" stroke-width="2" opacity="0.6" style="animation-delay: 0.7s;"/>
          <circle cx="165" cy="340" r="8" class="cb-map-dot" fill="#00bcf1" stroke="#ffffff" stroke-width="2.5"/>
          <text x="165" y="368" class="cb-map-city-label">Los Angeles</text>

          <!-- City: Austin -->
          <circle cx="460" cy="400" r="6" class="cb-map-pulse" fill="none" stroke="#00bcf1" stroke-width="2" opacity="0.6"/>
          <circle cx="460" cy="400" r="6" class="cb-map-pulse" fill="none" stroke="#00bcf1" stroke-width="2" opacity="0.6" style="animation-delay: 0.7s;"/>
          <circle cx="460" cy="400" r="8" class="cb-map-dot" fill="#00bcf1" stroke="#ffffff" stroke-width="2.5"/>
          <text x="460" y="428" class="cb-map-city-label">Austin</text>

          <!-- City: Chicago -->
          <circle cx="580" cy="220" r="6" class="cb-map-pulse" fill="none" stroke="#00bcf1" stroke-width="2" opacity="0.6"/>
          <circle cx="580" cy="220" r="6" class="cb-map-pulse" fill="none" stroke="#00bcf1" stroke-width="2" opacity="0.6" style="animation-delay: 0.7s;"/>
          <circle cx="580" cy="220" r="8" class="cb-map-dot" fill="#00bcf1" stroke="#ffffff" stroke-width="2.5"/>
          <text x="580" y="248" class="cb-map-city-label">Chicago</text>

          <!-- City: New York City -->
          <circle cx="810" cy="195" r="6" class="cb-map-pulse" fill="none" stroke="#00bcf1" stroke-width="2" opacity="0.6"/>
          <circle cx="810" cy="195" r="6" class="cb-map-pulse" fill="none" stroke="#00bcf1" stroke-width="2" opacity="0.6" style="animation-delay: 0.7s;"/>
          <circle cx="810" cy="195" r="8" class="cb-map-dot" fill="#00bcf1" stroke="#ffffff" stroke-width="2.5"/>
          <text x="810" y="180" class="cb-map-city-label">New York City</text>

        </svg>
      </div>
    </div>

    <div class="cb-map-stats">
      <div class="cb-map-stat">
        <p class="cb-map-stat-value">4</p>
        <p class="cb-map-stat-label">Cities</p>
      </div>
      <div class="cb-map-stat">
        <p class="cb-map-stat-value">0</p>
        <p class="cb-map-stat-label">Production Crews</p>
      </div>
      <div class="cb-map-stat">
        <p class="cb-map-stat-value">100%</p>
        <p class="cb-map-stat-label">On Brand</p>
      </div>
    </div>

  </div>
</div>
