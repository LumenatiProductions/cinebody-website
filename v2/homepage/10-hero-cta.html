<style>
  /* Squarespace padding reset */
  .sqs-block.code-block { padding: 0 !important; }
  .sqs-block-content { padding: 0 !important; }

  .cb-hero-cta {
    --cb-teal: #00bcf1;
    --cb-dark: #1a1a1a;
    --cb-yellow: #ffec03;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    width: 100vw;
    position: relative;
    left: 50%;
    transform: translateX(-50%);
    background: var(--cb-yellow);
    padding: 100px 20px;
    text-align: center;
    overflow: hidden;
  }

  .cb-hero-cta__inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 clamp(1rem, 3vw, 2.5rem);
  }

  .cb-hero-cta__line1 {
    font-size: clamp(2rem, 4.5vw, 3.25rem);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: var(--cb-dark);
    margin: 0 0 6px;
  }

  .cb-hero-cta__line2 {
    font-size: clamp(2rem, 4.5vw, 3.25rem);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: var(--cb-teal);
    margin: 0 0 40px;
  }

  /* CTA Button with glow */
  .cb-hero-cta__btn {
    display: inline-block;
    background: var(--cb-teal);
    color: #fff;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 18px 48px;
    border-radius: 12px;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(0, 188, 241, 0.3), 0 0 0 0 rgba(0, 188, 241, 0);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
  }

  .cb-hero-cta__btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .cb-hero-cta__btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 32px rgba(0, 188, 241, 0.4), 0 0 60px rgba(0, 188, 241, 0.15);
    color: #fff;
    text-decoration: none;
  }

  .cb-hero-cta__btn:hover::before {
    opacity: 1;
  }

  .cb-hero-cta__btn:active {
    transform: translateY(-1px) scale(0.99);
  }

  /* Reveal animation */
  .cb-hero-cta .cb-reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .cb-hero-cta .cb-reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Tablet */
  @media (max-width: 900px) {
    .cb-hero-cta {
      padding: 80px 20px;
    }

    .cb-hero-cta__line2 {
      margin-bottom: 36px;
    }
  }

  /* Mobile */
  @media (max-width: 600px) {
    .cb-hero-cta {
      padding: 64px 1rem;
    }

    .cb-hero-cta__line2 {
      margin-bottom: 32px;
    }

    .cb-hero-cta__btn {
      font-size: 14px;
      padding: 16px 40px;
    }
  }
</style>

<div class="cb-hero-cta">
  <div class="cb-hero-cta__inner cb-reveal">
    <div class="cb-hero-cta__line1">Stop outsourcing to strangers.</div>
    <div class="cb-hero-cta__line2">Start capturing from your community.</div>
    <a href="https://calendly.com/tyler-cinebody/creating-high-quality-ugc-with-cinebody" class="cb-hero-cta__btn">See How It Works</a>
  </div>
</div>

<script>
(function() {
  var els = document.querySelectorAll('.cb-hero-cta .cb-reveal');
  if (!els.length) return;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });
  els.forEach(function(el) { obs.observe(el); });
})();
</script>
