}

  position: relative;
  width: 100%;
  overflow: hidden;
  mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);

}

.marquee-track {
  display: flex;

  gap: 48px;

  animation: marquee-scroll 40s linear infinite;
}

.marquee-track img {

}

@keyframes marquee-scroll {

}

}

  background: rgba(255, 255, 255, 0.25);
  flex-shrink: 0;
}

  .stats-grid {
    flex-wrap: wrap;
    gap: 20px 0;
  }

  .stat-item {
    flex: 0 0 50%;
    padding: 8px 0;
  }

<script>
(function () {

  const logos = [
    { src: 'https://images.squarespace-cdn.com/content/v1/68752bed553a097656efd4e1/1752627396194-CW02B4SCASKFVILEHX39/image.png?format=300w', alt: 'Siemens' },
    { src: 'https://images.squarespace-cdn.com/content/v1/68752bed553a097656efd4e1/1752627404824-YUXZ8IAY5N0NJ7Y6L4Y7/WebMD_logo.png?format=300w', alt: 'WebMD' },
    { src: 'https://images.squarespace-cdn.com/content/v1/68752bed553a097656efd4e1/1752627411120-274CV165FQ2V3F5ES5RB/Royal_Caribbean_logo_%2525282024%252529.svg.png?format=300w', alt: 'Royal Caribbean' },
    { src: 'https://images.squarespace-cdn.com/content/v1/68752bed553a097656efd4e1/1752627421486-833XE0MQ1XX3CN6X4CWM/Roku_logo.svg.png?format=300w', alt: 'Roku' },
    { src: 'https://images.squarespace-cdn.com/content/v1/68752bed553a097656efd4e1/1752627430711-TW8HK4VKFQZ4J7AZ0P7G/Altra_running_logo.png?format=300w', alt: 'Altra' },
    { src: 'https://images.squarespace-cdn.com/content/v1/68752bed553a097656efd4e1/1752627268766-2QVYTRN3751AIPACC1DY/Boeing_full_logo.svg.png?format=300w', alt: 'Boeing' },
    { src: 'https://images.squarespace-cdn.com/content/v1/68752bed553a097656efd4e1/1752627290901-W6MGMUKBSWN9LCQ0A0PE/Experian_logo.svg.png?format=300w', alt: 'Experian' },
    { src: 'https://images.squarespace-cdn.com/content/v1/68752bed553a097656efd4e1/1752627278987-YPPWINMNWY9CFG5RG38P/Dell_Logo.svg.png?format=100w', alt: 'Dell' },
    { src: 'https://images.squarespace-cdn.com/content/v1/68752bed553a097656efd4e1/1752627309936-06LGFF1K8WXPIXXW2NVF/S%252526P_Global_logo.svg.png?format=300w', alt: 'S&P Global' },
    { src: 'https://images.squarespace-cdn.com/content/v1/68752bed553a097656efd4e1/1752627244801-4T8VLUAN2NBAD3KRIXG0/ACS_RGB.webp?format=300w', alt: 'ACS' },
    { src: 'https://images.squarespace-cdn.com/content/v1/68752bed553a097656efd4e1/1752627302251-THIBJL435U9YGI7FHQLF/Logo_Ball_Corporation.svg.png?format=100w', alt: 'Ball' },

  ];

  const track = document.getElementById('marqueeTrack');

  // Duplicate logos 3x for seamless infinite scroll
  for (let i = 0; i < 3; i++) {
    logos.forEach(function (logo) {
      const img = document.createElement('img');
      img.src = logo.src;
      img.alt = logo.alt;
      img.loading = 'lazy';
      img.draggable = false;
      track.appendChild(img);
    });
  }
})();
</script>
